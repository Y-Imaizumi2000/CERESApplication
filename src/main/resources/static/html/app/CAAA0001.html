<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>ログイン画面</title>
	<meta name="description" content="専用WEBサイトを閲覧するためのログイン画面">
	<meta name="viewport" content="width=device-width">
	<link href="../../css/common.css" rel="stylesheet">
	<link href="../../css/app/CAAA0001.css" rel="stylesheet">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
</head>

<body>

	<!-- headerここから -->
	<header class="header">
		<div class="header-inner">
			<img class="header-logo" src="../../image/common/logo-header-kasumin'sCafe.png" alt="KASUMI">
		</div>
	</header>
	<!-- headerここまで -->
	<!-- mainここから -->
	<main class="main">
		<div class="contact">
			<h2>ログイン</h2>
			<form action="#" id="loginForm">
				<div id="errorMessage" style="color:red; margin-top:5px;"></div>
				<dl class="form-area">
				<dt><span class="required">ID</span></dt>
				<dd><input class="input-text" type="text" name="id" required></dd>
				<dt><span class="required">パスワード</span></dt>
				<dd><input class="input-text" type="password" name="pass" required></dd>
				</dl>
				<a href="./CAAB0001.html">ユーザー登録はこちらから</a>
				<button class="submit-button" type="submit">ログイン</button>
			</form>
		</div>
	</main>
	<!-- mainここまで -->

	<!-- footerここから -->
	<footer class="footer">
		<img class="footer-logo" src="../../image/common/logo-footer-kasumin'sCafe.png" alt="KASUMI">
		<p class="footer-tel">TEL：　 ひ　み　つ　♡</p>
		<p class="footer-time">OPEN Fri-Sun 20:00-24:00</p>
		<p class="copyright"><small>&copy;Kasumi</small></p>
	</footer>
	<!-- footerここまで --> 

	<!-- javaScriptの定義 -->
	<script src="../../js/app/CAAA0001.js"></script>
</body>

</html>
